<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6B4C9A"/>
      <stop offset="100%" stop-color="#AA5CC3"/>
    </linearGradient>
    <linearGradient id="bookGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#e8dff5" stop-opacity="0.95"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#3a2260" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" rx="12" fill="url(#bg)"/>

  <!-- Subtle pattern overlay -->
  <rect width="900" height="200" rx="12" fill="none" stroke="white" stroke-opacity="0.05" stroke-width="0.5"/>
  <line x1="0" y1="0" x2="900" y2="200" stroke="white" stroke-opacity="0.03" stroke-width="80"/>

  <!-- Book icon group -->
  <g transform="translate(80, 52)" filter="url(#shadow)">
    <!-- Back cover (slightly offset) -->
    <rect x="6" y="4" width="62" height="88" rx="3" fill="#e8dff5" stroke="#8b6fb0" stroke-width="1.5"/>

    <!-- Front cover -->
    <rect x="0" y="0" width="62" height="88" rx="3" fill="url(#bookGrad)" stroke="#8b6fb0" stroke-width="1.5"/>

    <!-- Spine -->
    <line x1="8" y1="0" x2="8" y2="88" stroke="#8b6fb0" stroke-width="1.5" stroke-opacity="0.6"/>

    <!-- Cover image placeholder (mountains/landscape icon) -->
    <rect x="16" y="12" width="38" height="30" rx="2" fill="#c9b8e8" fill-opacity="0.5"/>
    <circle cx="28" cy="22" r="4" fill="#AA5CC3" fill-opacity="0.6"/>
    <polygon points="22,42 35,26 42,34 48,28 54,42" fill="#8b6fb0" fill-opacity="0.5"/>

    <!-- Title lines on cover -->
    <rect x="16" y="50" width="30" height="3" rx="1" fill="#8b6fb0" fill-opacity="0.5"/>
    <rect x="16" y="58" width="22" height="3" rx="1" fill="#8b6fb0" fill-opacity="0.3"/>
    <rect x="16" y="66" width="26" height="3" rx="1" fill="#8b6fb0" fill-opacity="0.3"/>

    <!-- Extraction arrow -->
    <g transform="translate(72, 30)">
      <line x1="0" y1="14" x2="22" y2="14" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
      <polyline points="16,8 22,14 16,20" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- Extracted image thumbnail -->
    <g transform="translate(98, 10)">
      <rect x="0" y="0" width="46" height="68" rx="3" fill="white" stroke="#AA5CC3" stroke-width="1.5" stroke-dasharray="4 2"/>
      <rect x="5" y="5" width="36" height="26" rx="2" fill="#c9b8e8" fill-opacity="0.4"/>
      <circle cx="14" cy="14" r="4" fill="#AA5CC3" fill-opacity="0.5"/>
      <polygon points="9,31 20,17 27,24 33,18 41,31" fill="#8b6fb0" fill-opacity="0.4"/>
      <rect x="5" y="38" width="24" height="3" rx="1" fill="#8b6fb0" fill-opacity="0.3"/>
      <rect x="5" y="46" width="18" height="3" rx="1" fill="#8b6fb0" fill-opacity="0.2"/>
      <!-- Checkmark -->
      <circle cx="38" cy="60" r="8" fill="#4CAF50"/>
      <polyline points="33,60 37,64 43,56" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- Title text -->
  <text x="340" y="95" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="700" fill="white" letter-spacing="-0.5">
    jellyfin-plugin-book-cover
  </text>

  <!-- Subtitle -->
  <text x="340" y="128" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="16" fill="white" fill-opacity="0.85" font-weight="400">
    Fallback cover extraction for Jellyfin books and audiobooks
  </text>

  <!-- Bottom tags -->
  <g transform="translate(340, 148)">
    <rect x="0" y="0" width="48" height="22" rx="11" fill="white" fill-opacity="0.15"/>
    <text x="24" y="15" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="white" fill-opacity="0.9" text-anchor="middle">PDF</text>

    <rect x="56" y="0" width="54" height="22" rx="11" fill="white" fill-opacity="0.15"/>
    <text x="83" y="15" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="white" fill-opacity="0.9" text-anchor="middle">EPUB</text>

    <rect x="118" y="0" width="54" height="22" rx="11" fill="white" fill-opacity="0.15"/>
    <text x="145" y="15" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="white" fill-opacity="0.9" text-anchor="middle">MP3</text>

    <rect x="180" y="0" width="54" height="22" rx="11" fill="white" fill-opacity="0.15"/>
    <text x="207" y="15" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="white" fill-opacity="0.9" text-anchor="middle">M4B</text>

    <rect x="242" y="0" width="54" height="22" rx="11" fill="white" fill-opacity="0.15"/>
    <text x="269" y="15" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="white" fill-opacity="0.9" text-anchor="middle">FLAC</text>

    <rect x="304" y="0" width="62" height="22" rx="11" fill="white" fill-opacity="0.15"/>
    <text x="335" y="15" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="white" fill-opacity="0.9" text-anchor="middle">+more</text>
  </g>
</svg>
